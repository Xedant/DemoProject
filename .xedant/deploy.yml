deploy:
  server-netcore-debug:
    os: windows
    method: debug
    path: "server-netcore/bin/publish"
    watch: "*.exe"
    shallowCopy: true
    command: "server-netcore --urls http://localhost:5001"
    delay: 3
    url: http://localhost:5001/
  server-python-debug:
    os: windows
    method: debug
    path: "server-python/"
    watch: "*.py"
    shallowCopy: true
    command: "python app.py"
    delay: 2
    url: http://localhost:5002/
  server-node-debug:
    os: windows
    method: debug
    path: "server-node/"
    watch: "*.js"
    shallowCopy: true
    command: "node index.js"
    delay: 2
    url: http://localhost:5003/
